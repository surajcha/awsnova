version: "3.8"

services:
  backend:
    build: ./backend
    container_name: nova-mkg-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_index:/app/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: nova-mkg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
